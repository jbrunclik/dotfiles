[skin]
    description = Catppuccin Mocha
    truecolors = true

[Lines]
    horiz = ─
    vert = │
    lefttop = ╭
    righttop = ╮
    leftbottom = ╰
    rightbottom = ╯
    topmiddle = ┬
    bottommiddle = ┴
    leftmiddle = ├
    rightmiddle = ┤
    cross = ┼
    dhoriz = ─
    dvert = │
    dlefttop = ╭
    drighttop = ╮
    dleftbottom = ╰
    drightbottom = ╯
    dtopmiddle = ┬
    dbottommiddle = ┴
    dleftmiddle = ├
    drightmiddle = ┤

[core]
    _default_ = #cdd6f4;#1e1e2e
    selected = #cdd6f4;#45475a
    marked = #a6e3a1;#1e1e2e;bold
    markselect = #a6e3a1;#45475a;bold
    gauge = #1e1e2e;#89b4fa
    input = #cdd6f4;#313244
    inputunchanged = #6c7086;#313244
    inputmark = #1e1e2e;#89b4fa
    disabled = #6c7086;#1e1e2e
    reverse = #1e1e2e;#cdd6f4
    commandlinemark = #1e1e2e;#89b4fa
    header = #f9e2af;#1e1e2e
    inputhistory =
    commandhistory =

[dialog]
    _default_ = #cdd6f4;#313244
    dfocus = #1e1e2e;#89b4fa
    dhotnormal = #fab387;#313244
    dhotfocus = #1e1e2e;#89b4fa
    dtitle = #cba6f7;#313244;bold

[error]
    _default_ = #f38ba8;#313244
    errdfocus = #1e1e2e;#f38ba8
    errdhotnormal = #fab387;#313244
    errdhotfocus = #1e1e2e;#f38ba8
    errdtitle = #f38ba8;#313244;bold

[filehighlight]
    directory = #89b4fa;
    executable = #a6e3a1;
    symlink = #94e2d5;
    hardlink = #94e2d5;
    stalelink = #f38ba8;
    device = #f9e2af;
    special = #cba6f7;
    core = #f38ba8;
    temp = #6c7086;
    archive = #fab387;
    doc = #cdd6f4;
    source = #a6e3a1;
    media = #f5c2e7;
    graph = #74c7ec;
    database = #cba6f7;

[menu]
    _default_ = #cdd6f4;#313244
    menusel = #1e1e2e;#89b4fa
    menuhot = #fab387;#313244
    menuhotsel = #1e1e2e;#89b4fa
    menuinactive = #6c7086;#313244

[popupmenu]
    _default_ = #cdd6f4;#313244
    menusel = #1e1e2e;#89b4fa
    menutitle = #cba6f7;#313244;bold

[buttonbar]
    hotkey = #1e1e2e;#89b4fa
    button = #cdd6f4;#313244

[statusbar]
    _default_ = #cdd6f4;#313244

[help]
    _default_ = #cdd6f4;#1e1e2e
    helpitalic = #f5c2e7;#1e1e2e
    helpbold = #fab387;#1e1e2e;bold
    helplink = #89b4fa;#1e1e2e
    helpslink = #1e1e2e;#89b4fa
    helptitle = #cba6f7;#1e1e2e;bold

[editor]
    _default_ = #cdd6f4;#1e1e2e
    editbold = #fab387;#1e1e2e;bold
    editmarked = #1e1e2e;#89b4fa
    editwhitespace = #585b70;#313244
    editlinestate = #cdd6f4;#313244
    bookmark = #1e1e2e;#cba6f7
    bookmarkfound = #1e1e2e;#a6e3a1
    editrightmargin = #585b70;#1e1e2e
    editframe = #6c7086;
    editframeactive = #89b4fa;
    editframedrag = #f38ba8;

[viewer]
    _default_ = #cdd6f4;#1e1e2e
    viewbold = #fab387;#1e1e2e;bold
    viewunderline = #89b4fa;#1e1e2e;underline
    viewselected = #1e1e2e;#89b4fa

[diffviewer]
    added = #1e1e2e;#a6e3a1
    changedline = #1e1e2e;#f9e2af
    changednew = #1e1e2e;#a6e3a1
    changed = #1e1e2e;#f9e2af
    removed = #1e1e2e;#f38ba8
    error = #f38ba8;#1e1e2e

[widget-common]
    sort-sign-up = ↑
    sort-sign-down = ↓

[widget-panel]
    hiddenfiles-sign-show = •
    hiddenfiles-sign-hide = ○
    history-prev-item-sign = «
    history-next-item-sign = »
    history-show-list-sign = ^
    filename-scroll-left-char = «
    filename-scroll-right-char = »

[widget-editor]
    window-state-char = ↕
    window-close-char = ✕
